<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1 class="title">테트리스</h1>
    <div class="game-container">
      <div id="board" class="board" aria-label="게임 보드"></div>
      <aside class="sidebar">
        <section class="panel score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
          <p id="game-status" class="game-status hidden" role="status" aria-live="polite"></p>
        </section>
        <section class="panel button-panel">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </section>
      </aside>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
